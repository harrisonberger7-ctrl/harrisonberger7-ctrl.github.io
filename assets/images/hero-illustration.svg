<!--
  Sample placeholder images in SVG format. Replace files in assets/images/ with your own photos or CAD renderings.
  Keep filenames but replace content to avoid changing code.
-->

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#1b1d1f"/>
      <stop offset="1" stop-color="#111213"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#g)"/>
  <g fill="#cbd1d6" font-family="Arial, Helvetica, sans-serif">
    <text x="60" y="100" font-size="42" font-weight="700">Technical Hero Image (placeholder)</text>
    <text x="60" y="150" font-size="18">Replace /assets/images/hero-illustration.svg with a high-resolution engineering photo or rendering.</text>
  </g>
  <g transform="translate(60,220)" fill="#3a3f44" opacity="0.9">
    <rect x="0" y="0" width="420" height="240" rx="6" fill="#151617"/>
    <rect x="460" y="0" width="240" height="240" rx="6" fill="#161719"/>
  </g>
  <text x="60" y="680" font-size="12" fill="#7f878d">Harrison Berger — placeholder image</text>
</svg>
